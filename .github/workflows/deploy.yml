name: Despliegue Ojo de Sauron

on:
  push:
    branches: [ main ]  # Se activa cada vez que subís algo a la rama main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Ejecutar comandos en el servidor
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SERVIDOR_KEY_GITHUB }}
          script: |
            cd /opt/ojo-de-sauron
            echo "¡Conexión exitosa desde GitHub Actions!"
            docker --version
            # Acá iremos agregando los comandos de Docker más adelante
